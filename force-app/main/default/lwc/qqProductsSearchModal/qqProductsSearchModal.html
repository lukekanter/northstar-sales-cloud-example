<template>
  <lightning-modal-header label="All Products"></lightning-modal-header>
  <lightning-modal-body>
    <div style="min-height: 500px">
      <template if:true={dataLoaded}>
        <lightning-input
          name="entry-search"
          label="Search Products"
          type="search"
          value={searchTerm}
          onchange={entrySearchHandler}
          class="slds-m-vertical_medium slds-size_1-of-3"
        ></lightning-input>

        <table
          aria-multiselectable="true"
          class="slds-table slds-table_bordered"
          role="grid"
          aria-label="All Pricebook Entries"
          style="width: 90%"
          onscroll={handleScroll}
        >
          <thead>
            <tr class="slds-line-height_reset">
              <th
                class="slds-text-align_right slds-cell_action-mode"
                scope="col"
                style="width: 3.25rem"
              >
                <!-- QQ patch: removed the non-functional "Select All"
                     header checkbox — it had no handler, so checking it selected
                     nothing yet looked like it selected the page, and the quote
                     saved without those rows. Per-row checkboxes drive selection.
                     Diverges from upstream d1c406e. -->
                <span id="column-group-header" class="slds-assistive-text"
                  >Choose a row</span
                >
              </th>
              <th
                aria-label="Product Name"
                class="slds-cell_action-mode"
                scope="col"
              >
                <div
                  class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate"
                >
                  <span class="slds-truncate" title="Product Name"
                    >Product Name</span
                  >
                </div>
              </th>
              <th
                aria-label="Product Code"
                class="slds-cell_action-mode"
                scope="col"
              >
                <div
                  class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate"
                >
                  <span class="slds-truncate" title="Product Code"
                    >Product Code</span
                  >
                </div>
              </th>
              <th
                aria-label="Unit Price"
                class="slds-cell_action-mode"
                scope="col"
              >
                <div
                  class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate"
                >
                  <span class="slds-truncate" title="Unit Price"
                    >Unit Price</span
                  >
                </div>
              </th>
            </tr>
          </thead>
          <tbody>
            <template
              for:each={pricebookData}
              for:item="pricebookEntry"
              for:index="index"
            >
              <tr
                key={pricebookEntry.Id}
                aria-selected="false"
                class="slds-hint-parent"
              >
                <td
                  class="slds-text-align_right slds-cell_action-mode"
                  role="gridcell"
                >
                  <lightning-input
                    type="checkbox"
                    data-id={pricebookEntry.Id}
                    checked={pricebookEntry.isSelected}
                    onchange={rowSelectionHandler}
                    label={pricebookEntry.Name}
                    variant="label-hidden"
                  >
                  </lightning-input>
                </td>
                <th class="slds-cell_action-mode" scope="row">
                  <div class="slds-truncate" title={pricebookEntry.Name}>
                    <a href="#" tabindex="0">{pricebookEntry.Name}</a>
                  </div>
                </th>
                <td class="slds-cell_action-mode" role="gridcell">
                  <div class="slds-truncate" title={pricebookEntry.ProductCode}>
                    {pricebookEntry.ProductCode}
                  </div>
                </td>
                <td class="slds-cell_action-mode" role="gridcell">
                  <div class="slds-truncate" title={pricebookEntry.UnitPrice}>
                    <lightning-formatted-number
                      value={pricebookEntry.UnitPrice}
                      currency-code={currencyCode}
                      format-style="currency"
                      currency-display-as="symbol"
                    ></lightning-formatted-number>
                  </div>
                </td>
              </tr>
            </template>
          </tbody>
          <template if:true={moreDataAvailable}>
            <tfoot>
              <tr>
                <td colspan="4" class="slds-text-align_center">
                  <lightning-button
                    label="Load More"
                    onclick={loadMoreRecords}
                  ></lightning-button>
                </td>
              </tr>
            </tfoot>
          </template>
        </table>
      </template>
    </div>
  </lightning-modal-body>
  <lightning-modal-footer>
    <lightning-button
      variant="brand"
      label="Save Products"
      onclick={saveHandler}
    ></lightning-button>
  </lightning-modal-footer>
</template>
